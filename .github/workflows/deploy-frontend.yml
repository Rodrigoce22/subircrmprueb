name: Deploy Influence CRM Frontend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: influence-crm/frontend
        run: npm install

      - name: Build frontend
        working-directory: influence-crm/frontend
        run: npm run build
        env:
          VITE_BASE_URL: /${{ github.event.repository.name }}/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: influence-crm/frontend/dist
          publish_branch: gh-pages
          allow_empty_commit: true
          commit_message: "Deploy Influence CRM frontend to GitHub Pages"
